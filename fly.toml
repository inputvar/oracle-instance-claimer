# fly.toml app configuration file generated for claimer-ocni on 2026-02-24T15:46:12+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'claimer-ocni'
primary_region = 'bom'

[build]

[env]
  OCI_PRIVATE_KEY_FILENAME = '/app/oci-key.pem'

[processes]
  app = '/app/start.sh'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
